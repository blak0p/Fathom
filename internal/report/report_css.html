{{ define "css" }}
    <style>
        :root {
            /* Light Theme Palette */
            --bg-primary: #fdf6f0;
            --bg-secondary: #ffffff;
            --bg-tertiary: #f4e9df;
            --border-color: #e7d8c8;
            --text-primary: #1f1611;
            --text-secondary: #7a5e4c;
            --accent-color: #c2410c;
            --accent-hover: #9a3412;

            --badge-clean-bg: #ecfdf5;
            --badge-clean-text: #065f46;
            --badge-clean-border: #10b981;

            --badge-review-bg: #fef2f2;
            --badge-review-text: #991b1b;
            --badge-review-border: #ef4444;

            --badge-warning-bg: #fffbeb;
            --badge-warning-text: #92400e;
            --badge-warning-border: #f59e0b;

            --badge-low-bg: #e0f2fe;
            --badge-low-text: #0369a1;
            --badge-low-border: #0ea5e9;

            /* Per-card backgrounds */
            --card-findings-bg: #fff7ed;
            --card-warnings-bg: #fffbeb;
            --card-files-bg: #eff6ff;
            --card-dead-bg: #f5f3ff;

            --card-findings-accent: #c2410c;
            --card-warnings-accent: #d97706;
            --card-files-accent: #2563eb;
            --card-dead-accent: #7c3aed;

            /* Risk tone — implicit verdict from counts */
            --risk-tone-high: #dc2626;
            --risk-tone-high-bg: #fef2f2;
            --risk-tone-med: #d97706;
            --risk-tone-med-bg: #fffbeb;
            --risk-tone-low: #059669;
            --risk-tone-low-bg: #ecfdf5;
            --risk-pulse-rgb: 220, 38, 38;

            --transition-speed: 0.2s;
        }

        html[data-theme="dark"] {
            --bg-primary: #1c1917;
            --bg-secondary: #292524;
            --bg-tertiary: #1c1917;
            --border-color: #44403c;
            --text-primary: #fafaf9;
            --text-secondary: #a8a29e;
            --accent-color: #fb923c;
            --accent-hover: #fdba74;

            --badge-clean-bg: #064e3b;
            --badge-clean-text: #a7f3d0;
            --badge-clean-border: #059669;

            --badge-review-bg: #7f1d1d;
            --badge-review-text: #fecaca;
            --badge-review-border: #dc2626;

            --badge-warning-bg: #451a03;
            --badge-warning-text: #fde68a;
            --badge-warning-border: #d97706;

            --badge-low-bg: #075985;
            --badge-low-text: #e0f2fe;
            --badge-low-border: #0284c7;

            --card-findings-bg: #431407;
            --card-warnings-bg: #451a03;
            --card-files-bg: #172554;
            --card-dead-bg: #2e1065;

            --card-findings-accent: #fb923c;
            --card-warnings-accent: #fbbf24;
            --card-files-accent: #60a5fa;
            --card-dead-accent: #a78bfa;

            --risk-tone-high: #f87171;
            --risk-tone-high-bg: #4c0519;
            --risk-pulse-rgb: 248, 113, 113;
            --risk-tone-med: #fbbf24;
            --risk-tone-med-bg: #451a03;
            --risk-tone-low: #34d399;
            --risk-tone-low-bg: #064e3b;
        }

        body, .block, .finding-item, .finding-summary, .collapsible-section,
        .section-summary, .search-input, .btn, table, th, td, tr,
        .diff-grid, .diff-header-col, .diff-row-cell, .summary-card,
        .risk-score, .file-tree-node {
            transition: background-color var(--transition-speed) ease,
                        color var(--transition-speed) ease,
                        border-color var(--transition-speed) ease,
                        box-shadow var(--transition-speed) ease;
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            margin: 0;
            padding: 2rem;
            line-height: 1.5;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            margin-bottom: 2rem;
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 1.5rem;
        }

        h1 {
            margin: 0;
            font-size: 2.25rem;
            font-weight: 800;
            color: var(--text-primary);
            letter-spacing: -0.025em;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-top: 0.5rem;
            font-size: 1.1rem;
        }

        .header-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 280px;
            padding: 0.75rem 1.25rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
            color: var(--text-primary);
            font-size: 1rem;
            outline: none;
        }
        .search-input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 3px rgba(194, 65, 12, 0.15);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.75rem 1.5rem;
            font-size: 0.95rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid transparent;
            user-select: none;
        }
        .btn-secondary {
            background-color: var(--bg-secondary);
            border-color: var(--border-color);
            color: var(--text-primary);
        }
        .btn-secondary:hover {
            background-color: var(--bg-tertiary);
            border-color: var(--text-secondary);
        }

        /* Risk score — implicit verdict from counts. No CLEAN/REVIEW banner.
           Tone is driven by data attributes set server-side from Summary counts. */
        .risk-score {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            padding: 1.25rem 1.5rem;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
            margin-bottom: 2.5rem;
        }
        .risk-score[data-tone="high"] {
            background-color: var(--risk-tone-high-bg);
            border-color: var(--risk-tone-high);
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.08);
            animation: risk-pulse 2s ease-in-out infinite;
        }
        .risk-score[data-tone="medium"] {
            background-color: var(--risk-tone-med-bg);
            border-color: var(--risk-tone-med);
        }
        .risk-score[data-tone="low"] {
            background-color: var(--risk-tone-low-bg);
            border-color: var(--risk-tone-low);
        }
        @keyframes risk-pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(var(--risk-pulse-rgb), 0.18); }
            50% { box-shadow: 0 0 0 6px rgba(var(--risk-pulse-rgb), 0); }
        }
        .risk-score .risk-dot {
            width: 0.875rem; height: 0.875rem; border-radius: 50%;
            flex-shrink: 0;
        }
        .risk-score[data-tone="high"] .risk-dot { background-color: var(--risk-tone-high); }
        .risk-score[data-tone="medium"] .risk-dot { background-color: var(--risk-tone-med); }
        .risk-score[data-tone="low"] .risk-dot { background-color: var(--risk-tone-low); }
        .risk-score .risk-label {
            font-weight: 700; font-size: 1.05rem; color: var(--text-primary);
        }
        .risk-score .risk-detail { color: var(--text-secondary); font-size: 0.95rem; }

        /* Executive Summary Card Grid */
        .summary-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.25rem;
            margin-bottom: 2.5rem;
        }
        .summary-card {
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.07), 0 2px 4px -1px rgba(0, 0, 0, 0.04);
            padding: 1.5rem;
            border: 1px solid var(--border-color);
            background-color: var(--bg-secondary);
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            min-width: 0;
        }
        .summary-card.findings  { background-color: var(--card-findings-bg); border-color: var(--card-findings-accent); }
        .summary-card.warnings  { background-color: var(--card-warnings-bg); border-color: var(--card-warnings-accent); }
        .summary-card.files     { background-color: var(--card-files-bg);    border-color: var(--card-files-accent); }
        .summary-card.deadcode  { background-color: var(--card-dead-bg);     border-color: var(--card-dead-accent); }
        .summary-card .card-label {
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.06em; color: var(--text-secondary);
        }
        .summary-card .card-count { font-size: 2.25rem; font-weight: 800; line-height: 1; color: var(--text-primary); }
        .summary-card.findings .card-count { color: var(--card-findings-accent); }
        .summary-card.warnings .card-count { color: var(--card-warnings-accent); }
        .summary-card.files    .card-count { color: var(--card-files-accent); }
        .summary-card.deadcode .card-count { color: var(--card-dead-accent); }
        /* Elevated tone on cards when risk is high — implicit, no banner. */
        .risk-tone-high .summary-card { border-width: 2px; }

        .block {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.02);
            padding: 2rem;
            margin-bottom: 2.5rem;
        }
        .block-title {
            font-size: 1.75rem; font-weight: 700; margin-top: 0; margin-bottom: 1.5rem;
            color: var(--text-primary); border-bottom: 2px solid var(--accent-color); padding-bottom: 0.75rem;
        }

        /* File tree — recursive <details> with severity badges */
        .file-tree {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.92rem;
            margin-top: 0.5rem;
        }
        .file-tree-node { display: block; }
        .file-tree details { margin-left: 1.1rem; }
        .file-tree > details { margin-left: 0; }
        .file-tree summary {
            cursor: pointer; user-select: none; list-style: none;
            padding: 0.3rem 0.5rem; border-radius: 6px;
            display: inline-flex; align-items: center; gap: 0.5rem;
        }
        .file-tree summary::-webkit-details-marker { display: none; }
        .file-tree summary::before { content: "▸"; color: var(--text-secondary); font-size: 0.7rem; transition: transform var(--transition-speed) ease; }
        .file-tree details[open] > summary::before { content: "▾"; }
        .file-tree summary:hover { background-color: var(--bg-tertiary); }
        .file-tree-leaf {
            display: inline-flex; align-items: center; gap: 0.5rem;
            padding: 0.3rem 0.5rem; border-radius: 6px;
            margin-left: 1.1rem;
        }
        .file-tree > .file-tree-leaf { margin-left: 0; }
        .file-tree-leaf:hover { background-color: var(--bg-tertiary); }
        .file-tree .file-name { color: var(--text-primary); }
        .file-tree .dir-name { font-weight: 700; color: var(--text-primary); }

        /* File-group section (findings grouped by file) */
        .file-group {
            border: 1px solid var(--border-color);
            border-radius: 10px;
            margin-bottom: 1.5rem;
            overflow: hidden;
            background-color: var(--bg-secondary);
        }
        .file-group-summary {
            background-color: var(--card-findings-bg);
            padding: 1rem 1.5rem;
            cursor: pointer; user-select: none; list-style: none;
            display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
            border-left: 4px solid var(--card-findings-accent);
        }
        .file-group-summary::-webkit-details-marker { display: none; }
        .file-group-summary:hover { background-color: var(--bg-tertiary); }
        .file-group-path {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-weight: 700; font-size: 1rem; color: var(--text-primary);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0;
        }
        .file-group-count { color: var(--text-secondary); font-size: 0.9rem; font-weight: 600; }

        /* Findings — phase-2 CSS hooks on each finding item */
        .finding-item {
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin: 1rem 1.25rem 1.25rem;
            overflow: hidden;
            background-color: var(--bg-secondary);
        }
        /* Phase-2 hooks — empty for now. Phase 2 adds breaking/override/internal. */
        .finding-item.finding--breaking { border-left: 4px solid var(--risk-tone-high); }
        .finding-item.finding--override { border-left: 4px solid var(--risk-tone-med); }
        .finding-item.finding--internal { border-left: 4px solid var(--text-secondary); }
        .finding-summary {
            background-color: var(--bg-tertiary);
            padding: 1.25rem 1.5rem;
            cursor: pointer; user-select: none; list-style: none;
        }
        .finding-summary::-webkit-details-marker { display: none; }
        .finding-summary:hover { background-color: var(--border-color); }
        .finding-header-grid {
            display: grid;
            grid-template-columns: minmax(180px, 1fr) minmax(220px, 1.2fr) minmax(300px, 1.8fr) auto;
            gap: 1.5rem; align-items: center; width: 100%;
        }
        .finding-header-item { display: flex; flex-direction: column; gap: 0.25rem; min-width: 0; }
        .finding-header-item .label {
            font-size: 0.7rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: 0.05em; color: var(--text-secondary);
        }
        .finding-header-item .val {
            font-size: 0.95rem; font-weight: 600; color: var(--text-primary);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .finding-header-item code {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            background-color: var(--bg-primary); padding: 0.125rem 0.375rem;
            border-radius: 4px; border: 1px solid var(--border-color); font-size: 0.85rem;
        }
        .finding-details {
            padding: 1.5rem; border-top: 1px solid var(--border-color); background-color: var(--bg-secondary);
        }

        .affected-callers {
            margin-bottom: 1.5rem; border: 1px solid var(--card-files-accent);
            border-radius: 8px; background-color: var(--card-files-bg); overflow: hidden;
        }
        .affected-callers-title {
            padding: 0.75rem 1.25rem; font-weight: 700; font-size: 0.95rem;
            color: var(--text-primary); background-color: var(--bg-tertiary);
            border-bottom: 1px solid var(--border-color);
        }
        .affected-callers table { margin-top: 0; border: none; border-radius: 0; }
        .affected-callers th { background-color: transparent; }

        .mismatch-list {
            background-color: var(--badge-review-bg);
            border-left: 4px solid var(--badge-review-border);
            padding: 1rem 1.25rem; margin-bottom: 1.5rem; border-radius: 0 6px 6px 0;
        }
        .mismatch-item {
            margin-bottom: 0.5rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.85rem; color: var(--badge-review-text);
        }
        .mismatch-item:last-child { margin-bottom: 0; }
        .mismatch-type { font-weight: 700; text-transform: uppercase; }
        .mismatch-loc { color: var(--text-secondary); font-size: 0.8rem; }

        .diff-section { margin-top: 1rem; }
        .diff-summary {
            display: inline-flex; align-items: center; gap: 0.75rem;
            padding: 0.5rem 0.9rem; background-color: var(--bg-tertiary);
            border: 1px solid var(--border-color); border-radius: 6px;
            font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 0.75rem;
        }
        .diff-summary .diff-count { font-weight: 700; color: var(--accent-color); }
        .diff-toggle-row { display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
        .diff-toggle-btn {
            padding: 0.4rem 0.9rem; font-size: 0.85rem; font-weight: 600;
            border-radius: 6px; border: 1px solid var(--accent-color);
            background-color: var(--bg-secondary); color: var(--accent-color);
            cursor: pointer; user-select: none;
        }
        .diff-toggle-btn:hover { background-color: var(--accent-color); color: var(--bg-secondary); }
        .diff-only-changes {
            display: inline-flex; align-items: center; gap: 0.4rem;
            font-size: 0.85rem; color: var(--text-secondary); cursor: pointer; user-select: none;
        }
        .diff-only-changes input { cursor: pointer; }
        .diff-collapsible { display: none; }
        .diff-collapsible.open { display: block; }

        .code-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-top: 1rem; }
        .code-column {
            border: 1px solid var(--border-color); border-radius: 6px;
            background-color: var(--bg-primary); overflow: hidden;
        }
        .code-header {
            background-color: var(--bg-tertiary); padding: 0.5rem 1rem;
            font-weight: 700; font-size: 0.85rem; color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
        }
        .code-body {
            margin: 0; padding: 1rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.85rem; overflow-x: auto; white-space: pre;
            background-color: var(--bg-primary); color: var(--text-primary);
        }

        .diff-grid {
            display: grid; grid-template-columns: 1fr 1fr;
            border: 1px solid var(--border-color); border-radius: 8px;
            overflow: hidden; background-color: var(--bg-secondary);
        }
        .diff-header { display: contents; }
        .diff-header-col {
            background-color: var(--bg-tertiary); padding: 0.75rem 1.25rem;
            font-weight: 700; font-size: 0.85rem; color: var(--text-secondary);
            border-bottom: 1px solid var(--border-color);
            text-transform: uppercase; letter-spacing: 0.05em;
        }
        .diff-header-col:first-child { border-right: 1px solid var(--border-color); }
        .diff-row-cell {
            display: flex; padding: 0.25rem 0.75rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.85rem; line-height: 1.4; white-space: pre-wrap; word-break: break-all;
        }
        .diff-row-cell.left { border-right: 1px solid var(--border-color); }
        .diff-row-cell .line-num {
            width: 3rem; margin-right: 0.75rem; color: var(--text-secondary);
            text-align: right; user-select: none; border-right: 1px solid var(--border-color);
            padding-right: 0.5rem; opacity: 0.6;
        }
        .diff-row-cell .code-line-text { flex: 1; }
        .diff-row-cell.equal { color: var(--text-primary); }
        .diff-row-cell.removed { background-color: var(--badge-review-bg); color: var(--badge-review-text); }
        .diff-row-cell.added { background-color: var(--badge-clean-bg); color: var(--badge-clean-text); }
        .diff-row-cell.empty { background-color: var(--bg-primary); opacity: 0.4; }
        .diff-row-cell.placeholder-cell {
            color: var(--text-secondary); font-style: italic; font-size: 0.85rem;
            padding: 0.75rem 1rem; display: flex; align-items: center; justify-content: center;
            background-color: var(--bg-primary);
        }

        table {
            width: 100%; border-collapse: separate; border-spacing: 0;
            margin-top: 1rem; text-align: left;
            border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden;
        }
        th, td { padding: 0.875rem 1.25rem; border-bottom: 1px solid var(--border-color); }
        th {
            background-color: var(--bg-tertiary); font-weight: 700; color: var(--text-secondary);
            font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em;
        }
        tr:last-child td { border-bottom: none; }
        tr { background-color: var(--bg-secondary); }
        tr:hover { background-color: var(--bg-tertiary); }

        ul.affected-files-list { margin: 0; padding-left: 1.5rem; color: var(--text-primary); }
        ul.affected-files-list li {
            margin-bottom: 0.5rem;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.9rem;
        }

        .collapsible-section {
            border: 1px solid var(--border-color); border-radius: 8px;
            background-color: var(--bg-secondary); overflow: hidden;
        }
        .section-summary {
            background-color: var(--bg-tertiary); padding: 1rem 1.5rem;
            font-weight: 700; cursor: pointer; user-select: none;
            font-size: 1.15rem; color: var(--text-primary);
            border-bottom: 1px solid transparent;
        }
        .section-summary::-webkit-details-marker { display: none; }
        .section-summary:hover { background-color: var(--border-color); }
        .collapsible-section[open] .section-summary { border-bottom: 1px solid var(--border-color); }
        .section-content { padding: 1.5rem; background-color: var(--bg-secondary); }

        .placeholder-coming-soon {
            color: var(--text-secondary); font-style: italic;
            padding: 1.5rem; text-align: center;
            background-color: var(--bg-tertiary); border-radius: 8px;
        }

        .badge {
            display: inline-block; padding: 0.25rem 0.625rem;
            font-size: 0.75rem; font-weight: 700; border-radius: 999px;
            text-transform: uppercase; letter-spacing: 0.05em; border: 1px solid transparent;
        }
        .badge-high { background-color: var(--badge-review-bg); color: var(--badge-review-text); border-color: var(--badge-review-border); }
        .badge-medium, .badge-warning { background-color: var(--badge-warning-bg); color: var(--badge-warning-text); border-color: var(--badge-warning-border); }
        .badge-low { background-color: var(--badge-low-bg); color: var(--badge-low-text); border-color: var(--badge-low-border); }

        .text-muted { color: var(--text-secondary); font-size: 0.875rem; }

        /* Blast radius graph container — PR 2 fills #blast-graph with d3. */
        #blast-graph {
            width: 100%; min-height: 320px;
            border: 1px dashed var(--border-color); border-radius: 8px;
            background-color: var(--bg-tertiary);
            display: flex; align-items: center; justify-content: center;
            color: var(--text-secondary); font-size: 0.9rem;
        }

        @media (max-width: 900px) {
            .summary-grid { grid-template-columns: repeat(2, 1fr); }
        }
        @media (max-width: 768px) {
            .summary-grid { grid-template-columns: 1fr; }
            .finding-header-grid { grid-template-columns: 1fr; gap: 0.5rem; }
            .finding-header-item .val { white-space: normal; }
            .code-grid, .diff-grid { grid-template-columns: 1fr; }
            .diff-header-col:first-child { border-right: none; border-bottom: 1px solid var(--border-color); }
